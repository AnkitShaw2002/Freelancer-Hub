version: "3.9"

services:
  app:
    build: .
    container_name: freelancer_hub_app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - redis
      - mongo

  mongo:
    image: mongo:7
    container_name: freelancer_hub_db
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    container_name: freelancer_hub_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mongo_data:
    driver: local
